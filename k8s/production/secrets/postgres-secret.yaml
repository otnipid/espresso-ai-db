# PostgreSQL Secrets for Production Environment
# Feature: Automatic Deployment
# Environment: Production
# Note: This is a template - actual secrets should be managed by your secret management system

apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: espresso-production
  labels:
    app: postgres
    env: production
type: Opaque
data:
  # Base64 encoded values - replace with your actual encoded secrets
  # echo -n 'espresso_ml_production' | base64
  database: ZXNBycmVzc19fbF9kcm9kdWN0aW9u
  # echo -n 'postgres' | base64
  username: cG9zdGdyZXM=
  # echo -n 'your_production_secure_password_here' | base64
  password: eW91cl9wcm9kdWN0aW9uX3NlY3VyZV9wYXNzd29yZF9oZXJl
---
# Application Secrets for Production Environment
apiVersion: v1
kind: Secret
metadata:
  name: app-secret
  namespace: espresso-production
  labels:
    app: espresso-api
    env: production
type: Opaque
data:
  # echo -n 'your_production_jwt_secret_here' | base64
  jwt-secret: eW91cl9wcm9kdWN0aW9uX2pqdF9zZWNyZXRfaGVyZQ==
  # echo -n 'production' | base64
  node-env: cHJvZHVjdGlvbg==
