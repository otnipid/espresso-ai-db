# PostgreSQL Persistent Volume Claim for Production Environment
# Feature: Automatic Deployment
# Environment: Production

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: espresso-production
  labels:
    app: postgres
    env: production
spec:
  accessModes:
  - ReadWriteOnce
  storageClassName: fast-ssd
  resources:
    requests:
      storage: 50Gi
  volumeMode: Filesystem
