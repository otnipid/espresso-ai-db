# Backend Service for Production Environment (Blue-Green)
# Feature: Automatic Deployment
# Environment: Production

apiVersion: v1
kind: Service
metadata:
  name: espresso-api
  namespace: espresso-production
  labels:
    app: espresso-api
    env: production
spec:
  type: ClusterIP
  selector:
    app: espresso-api
    env: production
  ports:
  - name: http
    port: 80
    targetPort: 3001
    protocol: TCP
  sessionAffinity: None
