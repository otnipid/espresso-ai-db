# Backend Service for Development Environment
# Feature: Automatic Deployment
# Environment: Development

apiVersion: v1
kind: Service
metadata:
  name: espresso-api-service
  namespace: espresso-development
  labels:
    app: espresso-api
    env: development
spec:
  type: ClusterIP
  selector:
    app: espresso-api
    env: development
  ports:
  - name: http
    port: 80
    targetPort: 3001
    protocol: TCP
  sessionAffinity: None
