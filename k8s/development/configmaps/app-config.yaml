# Application Configuration for Development Environment
# Feature: Automatic Deployment
# Environment: Development

apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: espresso-development
  labels:
    app: espresso-api
    env: development
data:
  NODE_ENV: "development"
  LOG_LEVEL: "debug"
  CORS_ORIGIN: "https://development.espresso-ml.com"
  API_BASE_URL: "https://development-api.espresso-ml.com"
  FRONTEND_URL: "https://development.espresso-ml.com"
  DB_HOST: "postgres-service"
  DB_PORT: "5432"
  DB_SSL_MODE: "prefer"
  DB_POOL_MIN: "2"
  DB_POOL_MAX: "10"
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
  SESSION_SECRET: "development-session-secret"
  RATE_LIMIT_WINDOW_MS: "900000"
  RATE_LIMIT_MAX_REQUESTS: "100"
  ENABLE_METRICS: "true"
  METRICS_PORT: "9090"
