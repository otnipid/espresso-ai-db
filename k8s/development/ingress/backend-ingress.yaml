# Backend Ingress for Development Environment
# Feature: Automatic Deployment
# Environment: Development

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: espresso-api-ingress
  namespace: espresso-development
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://development.espresso-ml.com"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    cert-manager.io/cluster-issuer: letsencrypt-development
spec:
  tls:
  - hosts:
    - development-api.espresso-ml.com
    secretName: espresso-api-tls
  rules:
  - host: development-api.espresso-ml.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: espresso-api-service
            port:
              number: 80
