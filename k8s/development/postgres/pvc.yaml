# PostgreSQL Persistent Volume Claim for Development Environment
# Feature: Automatic Deployment
# Environment: Development

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: espresso-development
  labels:
    app: postgres
    env: development
spec:
  accessModes:
  - ReadWriteOnce
  storageClassName: fast-ssd
  resources:
    requests:
      storage: 10Gi
  volumeMode: Filesystem
