# PostgreSQL Service for Development Environment
# Feature: Automatic Deployment
# Environment: Development

apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: espresso-development
  labels:
    app: postgres
    env: development
spec:
  type: ClusterIP
  selector:
    app: postgres
    env: development
  ports:
  - name: postgres
    port: 5432
    targetPort: 5432
    protocol: TCP
  sessionAffinity: None
