# PostgreSQL Secrets for Development Environment
# Feature: Automatic Deployment
# Environment: Development
# Note: This is a template - actual secrets should be managed by your secret management system

apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: espresso-development
  labels:
    app: postgres
    env: development
type: Opaque
data:
  # Base64 encoded values - replace with your actual encoded secrets
  # echo -n 'espresso_ml_development' | base64
  database: ZXNBycmVzc19tbF9kZXZlbG9wbWVudA==
  # echo -n 'postgres' | base64
  username: cG9zdGdyZXM=
  # echo -n 'your_secure_password_here' | base64
  password: eW91cl9zZWN1cmVfcGFzc3dvcmRfaGVyZQ==
---
# Application Secrets for Development Environment
apiVersion: v1
kind: Secret
metadata:
  name: app-secret
  namespace: espresso-development
  labels:
    app: espresso-api
    env: development
type: Opaque
data:
  # echo -n 'your_jwt_secret_here' | base64
  jwt-secret: eW91cl9zZXdfc2VjcmV0X2hlcmU=
  # echo -n 'development' | base64
  node-env: ZGV2ZWxvcG1lbnQ=
