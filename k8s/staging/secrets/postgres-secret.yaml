# PostgreSQL Secrets for Staging Environment
# Feature: Automatic Deployment
# Environment: Staging
# Note: This is a template - actual secrets should be managed by your secret management system

apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: espresso-staging
  labels:
    app: postgres
    env: staging
type: Opaque
data:
  # Base64 encoded values - replace with your actual encoded secrets
  # echo -n 'espresso_ml_staging' | base64
  database: ZXNBycmVzc19fbF9zdGluZw==
  # echo -n 'postgres' | base64
  username: cG9zdGdyZXM=
  # echo -n 'your_secure_password_here' | base64
  password: eW91cl9zZWN1cmVfcGFzc3dvcmRfaGVyZQ==
---
# Application Secrets for Staging Environment
apiVersion: v1
kind: Secret
metadata:
  name: app-secret
  namespace: espresso-staging
  labels:
    app: espresso-api
    env: staging
type: Opaque
data:
  # echo -n 'your_jwt_secret_here' | base64
  jwt-secret: eW91cl9zZXdfc2VjcmV0X2hlcmU=
  # echo -n 'staging' | base64
  node-env: c3RhZ2luZw==
