# Backend Service for Staging Environment
# Feature: Automatic Deployment
# Environment: Staging

apiVersion: v1
kind: Service
metadata:
  name: espresso-api-service
  namespace: espresso-staging
  labels:
    app: espresso-api
    env: staging
spec:
  type: ClusterIP
  selector:
    app: espresso-api
    env: staging
  ports:
  - name: http
    port: 80
    targetPort: 3001
    protocol: TCP
  sessionAffinity: None
