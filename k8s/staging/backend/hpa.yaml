# Horizontal Pod Autoscaler for Backend - Staging
# Feature: Automatic Deployment
# Environment: Staging

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: espresso-api-hpa
  namespace: espresso-staging
  labels:
    app: espresso-api
    env: staging
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: espresso-api
  minReplicas: 1
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 10
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
      selectPolicy: Max
    selectPolicy: Max
