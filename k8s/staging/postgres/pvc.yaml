# PostgreSQL Persistent Volume Claim for Staging Environment
# Feature: Automatic Deployment
# Environment: Staging

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: espresso-staging
  labels:
    app: postgres
    env: staging
spec:
  accessModes:
  - ReadWriteOnce
  storageClassName: fast-ssd
  resources:
    requests:
      storage: 10Gi
  volumeMode: Filesystem
