name: Schema Validation

on:
  push:
    paths:
      - 'schema/**'
  pull_request:
    paths:
      - 'schema/**'

jobs:
  validate-schema:
    name: Validate Database Schema
    runs-on: ubuntu-latest
    strategy:
      matrix:
        postgres-version: ['14', '15', '16']
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PostgreSQL ${{ matrix.postgres-version }}
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg
          
          # Secure GPG key verification
          wget --quiet -O - https://www.postgresql.org/media/keys/ACCC4CF8.asc | gpg --dearmor | sudo tee /etc/apt/trusted.gpg.d/postgresql.gpg
          echo "deb [signed-by=/etc/apt/trusted.gpg.d/postgresql.gpg] http://apt.postgresql.org/pub/repos/apt/ $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y postgresql-${{ matrix.postgres-version }} postgresql-contrib-${{ matrix.postgres-version }}
          
          # Check if cluster exists, if not create it
          if ! sudo pg_lsclusters | grep -q "${{ matrix.postgres-version }}.*main"; then
            sudo pg_createcluster ${{ matrix.postgres-version }} main --start
          else
            # Cluster exists, ensure it's started
            sudo pg_ctlcluster ${{ matrix.postgres-version }} main start || true
          fi
          
          # Wait for PostgreSQL to be ready and get actual port
          PGPORT=$(sudo pg_lsclusters -h | grep "${{ matrix.postgres-version }}.*main" | awk '{print $3}')
          sudo -u postgres pg_isready -p $PGPORT -t 30
          
          # Create test user and database with secure credentials
          set +x
          if [ -n "${{ secrets.DB_PASSWORD }}" ]; then
            DB_PASSWORD="${{ secrets.DB_PASSWORD }}"
          else
            DB_PASSWORD=$(openssl rand -base64 32)
          fi
          sudo -u postgres psql -p $PGPORT -c "CREATE USER test WITH PASSWORD '$DB_PASSWORD';" 2>/dev/null || echo "User test already exists"
          sudo -u postgres createdb -p $PGPORT -O test testdb 2>/dev/null || echo "Database testdb already exists"
          # Grant limited privileges
          sudo -u postgres psql -p $PGPORT -c "GRANT CONNECT ON DATABASE testdb TO test;"
          sudo -u postgres psql -p $PGPORT -c "GRANT USAGE ON SCHEMA public TO test;"
          sudo -u postgres psql -p $PGPORT -c "GRANT CREATE ON SCHEMA public TO test;"
          set -x
          echo "DB_PASSWORD=$DB_PASSWORD" >> $GITHUB_ENV
          echo "PGPORT=$PGPORT" >> $GITHUB_ENV

      - name: Validate Schema Files
        run: |
          cd schema
          
          # Validate file sizes and content before processing
          for file in *.sql; do
            if [ $(stat -c%s "$file") -gt 1048576 ]; then
              echo "ERROR: File too large: $file"
              exit 1
            fi
            if grep -q -E "(DROP|DELETE|TRUNCATE)\s+(DATABASE|USER)" "$file"; then
              echo "ERROR: Dangerous SQL detected in: $file"
              exit 1
            fi
          done
          
          # Check each individual file with sanitized input
          for file in *.sql; do
            echo "Validating $file..."
            if [ "$file" = "00-schema.sql" ]; then
              echo "Skipping master schema file (will test individual files)"
            else
              # Sanitize file name to prevent injection
              if [[ "$file" =~ ^[a-zA-Z0-9_-]+\.sql$ ]]; then
                PGPASSWORD=$DB_PASSWORD psql -h localhost -p $PGPORT -U test -d testdb -f "$file"
              else
                echo "ERROR: Invalid file name: $file"
                exit 1
              fi
            fi
          done
          
          # Test that all tables were created successfully
          echo "Testing complete schema..."
          PGPASSWORD=$DB_PASSWORD psql -h localhost -p $PGPORT -U test -d testdb -c "\dt"

      - name: Test Schema Constraints
        run: |
          cd schema
          
          # Create test data to validate constraints with secure connection
          set +x
          PGPASSWORD=$DB_PASSWORD psql -h localhost -p $PGPORT -U test -d testdb << 'EOF'
          -- Test users table
          INSERT INTO users (name, email) VALUES ('Test User', 'test@example.com');
          
          -- Test beans table
          INSERT INTO beans (name, roaster, country) VALUES ('Test Bean', 'Test Roaster', 'Test Country');
          
          -- Test foreign key constraints
          INSERT INTO bean_batches (bean_id, roast_level) VALUES (
            (SELECT id FROM beans WHERE name = 'Test Bean'), 
            'Medium'
          );
          
          -- Verify data integrity
          SELECT COUNT(*) as user_count FROM users;
          SELECT COUNT(*) as bean_count FROM beans;
          SELECT COUNT(*) as batch_count FROM bean_batches;
          EOF
          set -x

      - name: Schema Documentation Check
        run: |
          cd schema
          
          # Check for required documentation
          for file in *.sql; do
            if ! grep -q "Purpose:" "$file"; then
              echo "ERROR: $file missing Purpose documentation"
              exit 1
            fi
            if ! grep -q "Dependencies:" "$file"; then
              echo "ERROR: $file missing Dependencies documentation"
              exit 1
            fi
            if ! grep -q "Idempotent:" "$file"; then
              echo "ERROR: $file missing Idempotent documentation"
              exit 1
            fi
          done
          echo "All schema files have proper documentation"