name: Infrastructure CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: espresso-ml-infrastructure

jobs:
  lint-and-format:
    name: Lint and Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v3
        with:
          version: 'v3.12.0'

      - name: Helm Lint
        run: |
          for chart in charts/*/; do
            if [ -f "$chart/Chart.yaml" ]; then
              echo "Linting chart: $chart"
              helm lint "$chart"
            fi
          done

      - name: Validate YAML
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: charts/
          config_file: .github/.yamllint.yml

  schema-validation:
    name: Validate Database Schema
    runs-on: ubuntu-latest
    needs: lint-and-format
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PostgreSQL
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql postgresql-contrib
          sudo systemctl start postgresql
          sudo -u postgres psql -c "CREATE USER test WITH SUPERUSER PASSWORD 'test';"
          sudo -u postgres createdb -O test testdb

      - name: Validate Schema
        run: |
          cd charts/postgesql/schema
          PGPASSWORD=test psql -h localhost -U test -d testdb -f 00-schema.sql
          echo "Schema validation completed successfully"

  helm-test:
    name: Test Helm Charts
    runs-on: ubuntu-latest
    needs: schema-validation
    strategy:
      matrix:
        k8s-version: ['1.27.0', '1.28.0', '1.29.0']
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v3
        with:
          version: 'v3.12.0'

      - name: Setup Kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: ${{ matrix.k8s-version }}

      - name: Setup Kind (Kubernetes in Docker)
        uses: helm/kind-action@v1.8.0
        with:
          cluster_name: kind-${{ matrix.k8s-version }}
          version: ${{ matrix.k8s-version }}

      - name: Install Chart Dependencies
        run: |
          cd charts/postgesql
          helm dependency update

      - name: Lint Chart
        run: |
          cd charts/postgesql
          helm lint .

      - name: Install Chart
        run: |
          cd charts/postgesql
          helm install test-postgres . \
            --wait \
            --timeout=10m \
            --set postgresql.password=testpass \
            --set postgresql.user=testuser \
            --set postgresql.db=testdb

      - name: Test Chart Installation
        run: |
          # Wait for pods to be ready
          kubectl wait --for=condition=ready pod \
            -l app.kubernetes.io/instance=test-postgres \
            --timeout=300s
          
          # Check pod status
          kubectl get pods -o wide
          kubectl get services
          kubectl get pvc

      - name: Run Integration Tests
        run: |
          # Port forward and test database connection
          kubectl port-forward svc/test-postgres-postgres 5432:5432 &
          PF_PID=$!
          sleep 10
          
          # Test database connection
          PGPASSWORD=testpass psql -h localhost -U testuser -d testdb -c "SELECT version();"
          
          # Test schema creation
          PGPASSWORD=testpass psql -h localhost -U testuser -d testdb -c "\dt"
          
          # Cleanup
          kill $PF_PID

      - name: Uninstall Chart
        if: always()
        run: |
          helm uninstall test-postgres || true

      - name: Cleanup Kind Cluster
        if: always()
        run: |
          kind delete cluster kind-${{ matrix.k8s-version }} || true

  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    needs: lint-and-format
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'

  build-and-push:
    name: Build and Push Infrastructure Images
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    needs: [helm-test, security-scan]
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
      image-tag: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max