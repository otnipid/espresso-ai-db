name: Infrastructure CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: espresso-ml-infrastructure

jobs:
  lint-and-format:
    name: Lint and Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v3
        with:
          version: 'v3.12.0'

      - name: Helm Lint
        run: |
          # Lint base chart
          echo "Linting base chart: charts/postgesql/"
          helm lint charts/postgesql/
          
          # Lint with environment-specific values
          echo "Linting with development values..."
          helm lint charts/postgesql/ -f charts/postgesql/values-development.yaml
          
          echo "Linting with production values..."
          helm lint charts/postgesql/ -f charts/postgesql/values-production.yaml

      - name: Validate Helm Templates
        run: |
          # Render and validate templates with different values
          echo "Validating templates with development values..."
          helm template espresso-db charts/postgesql/ -f charts/postgesql/values-development.yaml
          
          echo "Validating templates with production values..."
          helm template espresso-db charts/postgesql/ -f charts/postgesql/values-production.yaml

      - name: Validate YAML
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: charts/postgesql/values*.yaml
          config_file: .github/.yamllint.yml

  schema-validation:
    name: Validate Database Schema
    runs-on: ubuntu-latest
    needs: lint-and-format
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PostgreSQL
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql postgresql-contrib
          sudo systemctl start postgresql
          sudo -u postgres psql -c "CREATE USER test WITH SUPERUSER PASSWORD 'test';"
          sudo -u postgres createdb -O test testdb

      - name: Validate Schema
        run: |
          cd charts/postgesql/schema
          PGPASSWORD=test psql -h localhost -U test -d testdb -f 00-schema.sql
          echo "Schema validation completed successfully"

  helm-test:
    name: Test Helm Charts
    runs-on: ubuntu-latest
    needs: schema-validation
    strategy:
      matrix:
        k8s-version: ['1.27.0', '1.28.0', '1.29.0']
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v3
        with:
          version: 'v3.12.0'

      - name: Setup Kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.31.0'

      - name: Setup Kind (Kubernetes in Docker)
        uses: helm/kind-action@v1.8.0
        with:
          cluster_name: kind-${{ matrix.k8s-version }}

      - name: Install Chart Dependencies
        run: |
          cd charts/postgesql
          helm dependency update

      - name: Lint Chart
        run: |
          cd charts/postgesql
          helm lint .

      - name: Install Chart
        run: |
          cd charts/postgesql
          helm install test-postgres . \
            --wait \
            --timeout=10m \
            --set postgresql.password=testpass \
            --set postgresql.user=testuser \
            --set postgresql.db=testdb

      - name: Test Chart Installation
        run: |
          # Wait for pods to be ready
          kubectl wait --for=condition=ready pod \
            -l app.kubernetes.io/instance=test-postgres \
            --timeout=300s
          
          # Check pod status
          kubectl get pods -o wide
          kubectl get services
          kubectl get pvc

      - name: Run Integration Tests
        run: |
          # Port forward and test database connection
          kubectl port-forward svc/test-postgres-postgres 5432:5432 &
          PF_PID=$!
          sleep 10
          
          # Test database connection
          PGPASSWORD=testpass psql -h localhost -U testuser -d testdb -c "SELECT version();"
          
          # Test schema creation
          PGPASSWORD=testpass psql -h localhost -U testuser -d testdb -c "\dt"
          
          # Cleanup
          kill $PF_PID

      - name: Uninstall Chart
        if: always()
        run: |
          helm uninstall test-postgres || true

      - name: Cleanup Kind Cluster
        if: always()
        run: |
          kind delete cluster kind-${{ matrix.k8s-version }} || true

  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    needs: lint-and-format
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          scan-ref: '.'
          format: 'json'
          output: 'trivy-results.json'

      - name: Run Gitleaks (Secret Scanning)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Semgrep (Static Analysis)
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/src" \
            -e SEMGREP_APP_TOKEN="${{ secrets.SEMGREP_APP_TOKEN }}" \
            semgrep/semgrep semgrep ci

      - name: Process Trivy scan results
        run: |
          echo "🔍 Security scan results:"
          echo "========================"
          
          # Check if there are any vulnerabilities
          if [ -f "trivy-results.json" ]; then
            # Count vulnerabilities by severity using JSON format
            HIGH_COUNT=$(jq '.Results[] | select(.Vulnerabilities[]) | .Vulnerabilities[] | select(.Severity == "HIGH") | .Severity' trivy-results.json | wc -l | tr -d ' ')
            MEDIUM_COUNT=$(jq '.Results[] | select(.Vulnerabilities[]) | .Vulnerabilities[] | select(.Severity == "MEDIUM") | .Severity' trivy-results.json | wc -l | tr -d ' ')
            LOW_COUNT=$(jq '.Results[] | select(.Vulnerabilities[]) | .Vulnerabilities[] | select(.Severity == "LOW") | .Severity' trivy-results.json | wc -l | tr -d ' ')
            CRITICAL_COUNT=$(jq '.Results[] | select(.Vulnerabilities[]) | .Vulnerabilities[] | select(.Severity == "CRITICAL") | .Severity' trivy-results.json | wc -l | tr -d ' ')
            
            echo "🚨 Critical severity: $CRITICAL_COUNT"
            echo "🚨 High severity: $HIGH_COUNT"
            echo "⚠️  Medium severity: $MEDIUM_COUNT" 
            echo "ℹ️  Low severity: $LOW_COUNT"
            
            # Show top 5 vulnerabilities if any exist
            if [ "$CRITICAL_COUNT" -gt 0 ] || [ "$HIGH_COUNT" -gt 0 ]; then
              echo ""
              echo "🔍 Top vulnerabilities:"
              jq -r '.Results[] | select(.Vulnerabilities[]) | .Vulnerabilities[] | select(.Severity == "CRITICAL" or .Severity == "HIGH") | "\(.Severity): \(.Title) (\(.PkgName))"' trivy-results.json | head -5
            fi
            
            # Fail on critical or high severity vulnerabilities
            if [ "$CRITICAL_COUNT" -gt 0 ] || [ "$HIGH_COUNT" -gt 0 ]; then
              echo ""
              echo "❌ Security scan failed: Found $CRITICAL_COUNT critical and $HIGH_COUNT high severity vulnerabilities"
              exit 1
            else
              echo ""
              echo "✅ Security scan passed: No critical or high severity vulnerabilities found"
            fi
          else
            echo "⚠️  No scan results found"
          fi

      - name: Archive scan results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-scan-results
          path: |
            trivy-results.json
            semgrep.sarif
            gl-secret-detection.json
          retention-days: 30

  build-and-push:
    name: Build and Push Infrastructure Images
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    needs: [helm-test, security-scan]
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
      image-tag: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Scan Docker Image with Trivy
        run: |
          echo "🔍 Scanning Docker image: ${{ steps.meta.outputs.tags }}"
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v ${{ github.workspace }}:/src \
            aquasec/trivy:latest image \
            --format json \
            --output trivy-image-results.json \
            ${{ steps.meta.outputs.tags }}

      - name: Process Image Scan Results
        run: |
          if [ -f "trivy-image-results.json" ]; then
            echo "🐳 Docker Image Scan Results:"
            echo "=============================="
            
            # Count vulnerabilities by severity
            CRITICAL_COUNT=$(jq '.Results[]? | .Vulnerabilities[]? | select(.Severity == "CRITICAL") | .Severity' trivy-image-results.json | wc -l | tr -d ' ')
            HIGH_COUNT=$(jq '.Results[]? | .Vulnerabilities[]? | select(.Severity == "HIGH") | .Severity' trivy-image-results.json | wc -l | tr -d ' ')
            MEDIUM_COUNT=$(jq '.Results[]? | .Vulnerabilities[]? | select(.Severity == "MEDIUM") | .Severity' trivy-image-results.json | wc -l | tr -d ' ')
            
            echo "🚨 Critical severity: $CRITICAL_COUNT"
            echo "🔴 High severity: $HIGH_COUNT"
            echo "🟡 Medium severity: $MEDIUM_COUNT"
            
            # Show top vulnerabilities if any exist
            if [ "$CRITICAL_COUNT" -gt 0 ] || [ "$HIGH_COUNT" -gt 0 ]; then
              echo ""
              echo "🔍 Top image vulnerabilities:"
              jq -r '.Results[]? | .Vulnerabilities[]? | select(.Severity == "CRITICAL" or .Severity == "HIGH") | "\(.Severity): \(.Title) (\(.PkgName))"' trivy-image-results.json | head -5
            fi
            
            # Fail on critical or high severity vulnerabilities
            if [ "$CRITICAL_COUNT" -gt 0 ] || [ "$HIGH_COUNT" -gt 0 ]; then
              echo ""
              echo "❌ Image security scan failed: Found $CRITICAL_COUNT critical and $HIGH_COUNT high severity vulnerabilities"
              exit 1
            else
              echo ""
              echo "✅ Image security scan passed: No critical or high severity vulnerabilities found"
            fi
          else
            echo "⚠️  No image scan results found"
          fi

      - name: Archive Image Scan Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: container-scan-results
          path: trivy-image-results.json
          retention-days: 30