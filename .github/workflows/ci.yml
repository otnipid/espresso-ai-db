name: Infrastructure CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: otnipid/espresso-ml-postgres

jobs:
  lint-and-format:
    name: Lint and Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v3
        with:
          version: 'v3.12.0'

      - name: Helm Lint
        run: |
          # Lint base chart
          echo "Linting base chart: charts/postgesql/"
          helm lint charts/postgesql/
          
          # Lint with environment-specific values
          echo "Linting with development values..."
          helm lint charts/postgesql/ -f charts/postgesql/values-development.yaml
          
          echo "Linting with production values..."
          helm lint charts/postgesql/ -f charts/postgesql/values-production.yaml

      - name: Validate Helm Templates
        run: |
          # Render and validate templates with different values
          echo "Validating templates with development values..."
          helm template espresso-db charts/postgesql/ -f charts/postgesql/values-development.yaml
          
          echo "Validating templates with production values..."
          helm template espresso-db charts/postgesql/ -f charts/postgesql/values-production.yaml

      - name: Validate YAML
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: charts/postgesql/values*.yaml
          config_file: .github/.yamllint.yml

  schema-validation:
    name: Validate Database Schema
    runs-on: ubuntu-latest
    needs: lint-and-format
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PostgreSQL
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql postgresql-contrib
          sudo systemctl start postgresql
          sudo -u postgres psql -c "CREATE USER test WITH SUPERUSER PASSWORD '${{ secrets.CI_TEST_PASSWORD }}';"
          sudo -u postgres createdb -O test testdb

      - name: Validate Schema
        run: |
          cd charts/postgesql/schema
          PGPASSWORD=${{ secrets.CI_TEST_PASSWORD }} psql -h localhost -U test -d testdb -f 00-schema.sql
          echo "Schema validation completed successfully"

  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    needs: lint-and-format
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          scan-ref: '.'
          format: 'json'
          output: 'trivy-results.json'

      - name: Run Gitleaks (Secret Scanning)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Semgrep (Static Analysis)
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/src" \
            -e SEMGREP_APP_TOKEN="${{ secrets.SEMGREP_APP_TOKEN }}" \
            semgrep/semgrep semgrep ci

      - name: Process Trivy scan results
        run: |
          echo "🔍 Security scan results:"
          echo "========================"
          
          # Check if there are any vulnerabilities
          if [ -f "trivy-results.json" ]; then
            # Count vulnerabilities by severity using JSON format
            HIGH_COUNT=$(jq '.Results[] | select(.Vulnerabilities[]) | .Vulnerabilities[] | select(.Severity == "HIGH") | .Severity' trivy-results.json | wc -l | tr -d ' ')
            MEDIUM_COUNT=$(jq '.Results[] | select(.Vulnerabilities[]) | .Vulnerabilities[] | select(.Severity == "MEDIUM") | .Severity' trivy-results.json | wc -l | tr -d ' ')
            LOW_COUNT=$(jq '.Results[] | select(.Vulnerabilities[]) | .Vulnerabilities[] | select(.Severity == "LOW") | .Severity' trivy-results.json | wc -l | tr -d ' ')
            CRITICAL_COUNT=$(jq '.Results[] | select(.Vulnerabilities[]) | .Vulnerabilities[] | select(.Severity == "CRITICAL") | .Severity' trivy-results.json | wc -l | tr -d ' ')
            
            echo "🚨 Critical severity: $CRITICAL_COUNT"
            echo "🚨 High severity: $HIGH_COUNT"
            echo "⚠️  Medium severity: $MEDIUM_COUNT" 
            echo "ℹ️  Low severity: $LOW_COUNT"
            
            # Show top 5 vulnerabilities if any exist
            if [ "$CRITICAL_COUNT" -gt 0 ] || [ "$HIGH_COUNT" -gt 0 ]; then
              echo ""
              echo "🔍 Top vulnerabilities:"
              jq -r '.Results[] | select(.Vulnerabilities[]) | .Vulnerabilities[] | select(.Severity == "CRITICAL" or .Severity == "HIGH") | "\(.Severity): \(.Title) (\(.PkgName))"' trivy-results.json | head -5
            fi
            
            # Fail on critical or high severity vulnerabilities
            if [ "$CRITICAL_COUNT" -gt 0 ] || [ "$HIGH_COUNT" -gt 0 ]; then
              echo ""
              echo "❌ Security scan failed: Found $CRITICAL_COUNT critical and $HIGH_COUNT high severity vulnerabilities"
              exit 1
            else
              echo ""
              echo "✅ Security scan passed: No critical or high severity vulnerabilities found"
            fi
          else
            echo "⚠️  No scan results found"
          fi

      - name: Archive scan results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-scan-results
          path: |
            trivy-results.json
            semgrep.sarif
            gl-secret-detection.json
          retention-days: 30

  build-and-push:
    name: Build and Push Custom PostgreSQL Image
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    needs: [security-scan]
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
      image-tag: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan Custom Docker Image with Trivy
        run: |
          echo "🔍 Scanning custom Espresso ML PostgreSQL image: ${{ steps.meta.outputs.tags }}"
          # Use the first tag for scanning (Trivy can only scan one tag at a time)
          FIRST_TAG=$(echo "${{ steps.meta.outputs.tags }}" | head -n 1)
          echo "Scanning tag: $FIRST_TAG"
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v ${{ github.workspace }}:/src \
            aquasec/trivy:latest image \
            --format json \
            --output trivy-custom-image-results.json \
            $FIRST_TAG

      - name: Process Custom Image Scan Results
        run: |
          if [ -f "trivy-custom-image-results.json" ]; then
            echo "🐳 Custom Espresso ML PostgreSQL Image Scan Results:"
            echo "=================================================="
            
            # Count vulnerabilities by severity
            CRITICAL_COUNT=$(jq '.Results[]? | .Vulnerabilities[]? | select(.Severity == "CRITICAL") | .Severity' trivy-custom-image-results.json | wc -l | tr -d ' ')
            HIGH_COUNT=$(jq '.Results[]? | .Vulnerabilities[]? | select(.Severity == "HIGH") | .Severity' trivy-custom-image-results.json | wc -l | tr -d ' ')
            MEDIUM_COUNT=$(jq '.Results[]? | .Vulnerabilities[]? | select(.Severity == "MEDIUM") | .Severity' trivy-custom-image-results.json | wc -l | tr -d ' ')
            
            echo "🚨 Critical severity: $CRITICAL_COUNT"
            echo "🔴 High severity: $HIGH_COUNT"
            echo "🟡 Medium severity: $MEDIUM_COUNT"
            
            # Show top vulnerabilities if any exist
            if [ "$CRITICAL_COUNT" -gt 0 ] || [ "$HIGH_COUNT" -gt 0 ]; then
              echo ""
              echo "🔍 Top custom image vulnerabilities:"
              jq -r '.Results[]? | .Vulnerabilities[]? | select(.Severity == "CRITICAL" or .Severity == "HIGH") | "\(.Severity): \(.Title) (\(.PkgName))"' trivy-custom-image-results.json | head -5
              
              echo ""
              echo "⚠️  Consider updating base PostgreSQL version if critical vulnerabilities are found"
            else
              echo ""
              echo "✅ Custom image security scan passed: No critical or high severity vulnerabilities found"
            fi
          else
            echo "⚠️  No custom image scan results found"
          fi

      - name: Archive Custom Image Scan Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: custom-postgres-scan-results
          path: trivy-custom-image-results.json
          retention-days: 30