---
name: Deploy Database

on:
  workflow_run:
    workflows: ["Database CI Pipeline"]
    types:
      - completed
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'development'
        type: choice
        options:
          - development

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: otnipid/espresso-ai-db-postgres

jobs:
  version-management:
    name: Version Management
    runs-on: ubuntu-latest
    if: (github.ref == 'refs/heads/develop' && github.event.workflow_run.conclusion == 'success') || github.event_name == 'workflow_dispatch'
    outputs:
      version: ${{ steps.version.outputs.version }}
      version-type: ${{ steps.version.outputs.version-type }}
      release-notes: ${{ steps.version.outputs.release-notes }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Analyze and Bump Version
        id: version
        run: |
          chmod +x scripts/version-manager.sh
          ./scripts/version-manager.sh
          
          # Capture outputs
          VERSION=$(./scripts/version-manager.sh main | grep "🎯 Next version:" | sed 's/.*Next version: //' | tr -d '\n')
          VERSION_TYPE=$(./scripts/version-manager.sh main | grep "🎯 Next version:" | sed 's/.*(\(.*\) release.*/\1/' | tr -d '\n')
          RELEASE_NOTES=$(./scripts/version-manager.sh main | grep "📋 Release notes generated:" | sed 's/.*Release notes generated: //' | tr -d '\n')
          
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "version-type=$VERSION_TYPE" >> $GITHUB_OUTPUT
          echo "release-notes=$RELEASE_NOTES" >> $GITHUB_OUTPUT

      - name: Upload Release Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts-${{ steps.version.outputs.version }}
          path: |
            release-notes/
            CHANGELOG.md
            Dockerfile
          retention-days: 30

  deploy-development:
    name: Deploy to Development (Aiven)
    runs-on: ubuntu-latest
    needs: version-management
    if: (github.ref == 'refs/heads/develop' || github.event.inputs.environment == 'development') && (needs.version-management.result == 'success' || github.event_name == 'workflow_dispatch')
    environment: development
    env:
      AVN_AUTH_TOKEN: ${{ secrets.AIVEN_AUTH_TOKEN }}
      AIVEN_PROJECT: ${{ vars.AIVEN_PROJECT_NAME }}
      AIVEN_SERVICE: ${{ vars.AIVEN_SERVICE_NAME }}
      DEPLOY_VERSION: ${{ needs.version-management.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Aiven CLI
        run: |
          # Install Aiven CLI using pip (more reliable)
          pip install aiven-client
          avn --version

      - name: Deploy Schema to Aiven PostgreSQL
        env:
          AVN_AUTH_TOKEN: ${{ secrets.AIVEN_AUTH_TOKEN }}
        run: |
          echo " Deploying database schema to Aiven PostgreSQL (v${{ env.DEPLOY_VERSION }})..."
          
          # Get Aiven service connection details
          echo "Using service: ${{ env.AIVEN_SERVICE }}"
          
          echo "Testing service access..."
          avn service list
          
          echo "Getting service details..."
          SERVICE_URI=$(avn service get ${{ env.AIVEN_SERVICE }} --format '{service_uri}')
          echo "Full SERVICE_URI: $SERVICE_URI"
          # Extract connection info from URI
          DB_USER=$(echo "$SERVICE_URI" | sed -E 's#postgres://([^:]+):.*#\1#')
          DB_HOST=$(echo "$SERVICE_URI" | sed -E 's#postgres://[^:]+:[^@]+@([^:/]+):.*#\1#')
          DB_PORT=$(echo "$SERVICE_URI" | sed -E 's#postgres://[^:]+:[^@]+@[^:]+:([0-9]+)/.*#\1#')
          DB_NAME=$(echo "$SERVICE_URI" | sed -E 's#.*/([^/?]+).*#\1#')
          DB_PASSWORD=${{ secrets.AIVEN_DB_PASSWORD }}
          
          echo " Connecting to Aiven PostgreSQL: $DB_HOST:$DB_PORT/$DB_NAME"
          
          MAX_WAIT=60   # in seconds
          ELAPSED=0

          # Wait for DB with SSL enabled
          PGSSLMODE=require
          until pg_isready -h "$DB_HOST" -p "$DB_PORT" -U "$DB_USER" -d "$DB_NAME"; do
              if [ "$ELAPSED" -ge "$MAX_WAIT" ]; then
                  echo "❌ Database did not become ready after $MAX_WAIT seconds"
                  exit 1
              fi
              echo "⏳ Waiting for Aiven PostgreSQL to be ready..."
              sleep 5
              ELAPSED=$((ELAPSED + 5))
          done

          echo "✅ Database is ready!"

          # Deploy schema files in order
          cd schema
          
          echo "📋 Deploying schema files..."
          for file in 0*.sql; do
            echo "📄 Applying $file..."
            PGPASSWORD="$DB_PASSWORD" psql -h "$DB_HOST" -p "$DB_PORT" -U "$DB_USER" -d "$DB_NAME" -f "$file"
            if [ $? -eq 0 ]; then
              echo "✅ Successfully applied $file"
            else
              echo "❌ Failed to apply $file"
              exit 1
            fi
          done
          
          echo "🎉 Schema deployment completed successfully!"

      - name: Run Database Health Checks
        env:
          AVN_AUTH_TOKEN: ${{ secrets.AIVEN_AUTH_TOKEN }}
        run: |
          echo "🔍 Running database health checks..."
          
          # Get connection details
          SERVICE_URI=$(avn service get ${{ env.AIVEN_SERVICE }} --format '{service_uri}')
          echo "Debug: Full SERVICE_URI: $SERVICE_URI"
          
          # Extract connection info from URI
          DB_USER=$(echo "$SERVICE_URI" | sed -E 's#postgres://([^:]+):.*#\1#')
          DB_HOST=$(echo "$SERVICE_URI" | sed -E 's#postgres://[^:]+:[^@]+@([^:/]+):.*#\1#')
          DB_PORT=$(echo "$SERVICE_URI" | sed -E 's#postgres://[^:]+:[^@]+@[^:]+:([0-9]+)/.*#\1#')
          DB_NAME=$(echo "$SERVICE_URI" | sed -E 's#.*/([^/?]+).*#\1#')
          DB_PASSWORD=${{ secrets.AIVEN_DB_PASSWORD }}
          
          echo "Debug: DB_HOST=$DB_HOST, DB_PORT=$DB_PORT, DB_NAME=$DB_NAME, DB_USER=$DB_USER"
          
          # Test basic connectivity
          PGPASSWORD="$DB_PASSWORD" psql -h "$DB_HOST" -p "$DB_PORT" -U "$DB_USER" -d "$DB_NAME" -c "SELECT version();"
          
          # Verify tables were created
          TABLE_COUNT=$(PGPASSWORD="$DB_PASSWORD" psql -h "$DB_HOST" -p "$DB_PORT" -U "$DB_USER" -d "$DB_NAME" -t -c "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema = 'public';" | tr -d ' ')
          echo "📊 Found $TABLE_COUNT tables in database"
          
          # Test basic data insertion
          PGPASSWORD="$DB_PASSWORD" psql -h "$DB_HOST" -p "$DB_PORT" -U "$DB_USER" -d "$DB_NAME" << 'EOF'
          -- Test users table
          INSERT INTO users (name, email) VALUES ('Health Check User', 'health-check@example.com') ON CONFLICT (email) DO NOTHING;
          
          -- Verify data integrity
          SELECT COUNT(*) as user_count FROM users;
          EOF
          
          echo "✅ Database health checks passed!"

      - name: Update Deployment Status
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'success',
              target_url: 'https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}',
              description: 'PostgreSQL development deployment to Aiven successful (v${{ env.DEPLOY_VERSION }})',
              context: 'database/deployment'
            });

      - name: Notify Deployment Success
        run: |
          echo "🎉 Aiven PostgreSQL deployment completed successfully!"
          echo "📋 Service: ${{ env.AIVEN_SERVICE }}"
          echo "🏢 Project: ${{ env.AIVEN_PROJECT }}"
          echo "🌐 Database is ready for development use!"
          echo "🏷️  Version: ${{ env.DEPLOY_VERSION }}"
          
