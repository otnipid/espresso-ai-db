name: Deploy Infrastructure

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types:
      - completed
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: espresso-ml-infrastructure

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.event.inputs.environment == 'staging'
    environment: staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure kubectl
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG_STAGING }}

      - name: Deploy PostgreSQL
        run: |
          cd charts/postgesql
          helm dependency update
          helm upgrade --install espresso-db-staging . \
            --namespace staging \
            --create-namespace \
            --set postgresql.image=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --set postgresql.password=${{ secrets.POSTGRES_PASSWORD_STAGING }} \
            --set postgresql.user=${{ secrets.POSTGRES_USER_STAGING }} \
            --set postgresql.db=${{ secrets.POSTGRES_DB_STAGING }} \
            --wait \
            --timeout=10m

      - name: Verify Deployment
        run: |
          kubectl get pods -n staging
          kubectl get services -n staging
          
      - name: Run Health Checks
        run: |
          kubectl wait --for=condition=ready pod -l app.kubernetes.io/instance=espresso-db-staging -n staging --timeout=300s

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: github.event.inputs.environment == 'production'
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure kubectl
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG_PROD }}

      - name: Deploy PostgreSQL
        run: |
          cd charts/postgesql
          helm dependency update
          helm upgrade --install espresso-db-prod . \
            --namespace production \
            --create-namespace \
            --set postgresql.image=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --set postgresql.password=${{ secrets.POSTGRES_PASSWORD_PROD }} \
            --set postgresql.user=${{ secrets.POSTGRES_USER_PROD }} \
            --set postgresql.db=${{ secrets.POSTGRES_DB_PROD }} \
            --wait \
            --timeout=10m

      - name: Verify Deployment
        run: |
          kubectl get pods -n production
          kubectl get services -n production
          
      - name: Run Health Checks
        run: |
          kubectl wait --for=condition=ready pod -l app.kubernetes.io/instance=espresso-db-prod -n production --timeout=300s

      - name: Notify Slack
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          channel: '#deployments'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        if: always()