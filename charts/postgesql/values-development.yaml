---
postgresql:
  # Custom Espresso ML PostgreSQL image with pre-loaded schemas
  image: ghcr.io/espresso-ml/espresso-ml-postgres:latest
  # Fallback to official image if custom image is not available
  # image: postgres:15

  # PostgreSQL port
  port: 5432

  # PostgreSQL credentials (will be overridden by --set flags)
  user: espresso_dev_user
  password: null
  db: espresso_ml_development

  # Persistence configuration
  persistence:
    enabled: true
    size: 10Gi
    storageClass: fast-ssd

  # Resource configuration
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
