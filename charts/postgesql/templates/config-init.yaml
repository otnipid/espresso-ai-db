apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-init-sql
data:
  init.sql: |
    -- =========================
    -- BEANS
    -- =========================
    CREATE TABLE beans (
        id UUID PRIMARY KEY DEFAULT uuid_generate_v4(),
        name TEXT NOT NULL,
        roaster TEXT,
        country TEXT,
        region TEXT,
        farm TEXT,
        varietal TEXT,
        processing_method TEXT,
        altitude_m INTEGER,
        density_category TEXT,
        created_at TIMESTAMP DEFAULT NOW()
    );

    -- =========================
    -- BEAN BATCHES
    -- =========================
    CREATE TABLE bean_batches (
        id UUID PRIMARY KEY DEFAULT uuid_generate_v4(),
        bean_id UUID REFERENCES beans(id) ON DELETE CASCADE,
        roast_level TEXT,
        roast_date DATE,
        roast_degree INTEGER,
        bag_open_date DATE,
        created_at TIMESTAMP DEFAULT NOW()
    );

    -- =========================
    -- MACHINES
    -- =========================
    CREATE TABLE machines (
        id UUID PRIMARY KEY DEFAULT uuid_generate_v4(),
        model TEXT NOT NULL,
        firmware_version TEXT,
        created_at TIMESTAMP DEFAULT NOW()
    );

    -- =========================
    -- SHOTS (CORE EVENT)
    -- =========================
    CREATE TABLE shots (
        id UUID PRIMARY KEY DEFAULT uuid_generate_v4(),
        bean_batch_id UUID REFERENCES bean_batches(id),
        machine_id UUID REFERENCES machines(id),

        shot_type TEXT CHECK (shot_type IN ('ristretto', 'normale', 'lungo')),
        pulled_at TIMESTAMP DEFAULT NOW(),

        success BOOLEAN,
        created_at TIMESTAMP DEFAULT NOW()
    );

    -- =========================
    -- SHOT PREPARATION
    -- =========================
    CREATE TABLE shot_preparation (
        shot_id UUID PRIMARY KEY REFERENCES shots(id) ON DELETE CASCADE,

        grind_setting INTEGER,
        dose_grams NUMERIC(5,2),
        basket_type TEXT,
        basket_size_grams INTEGER,

        distribution_method TEXT,
        tamp_type TEXT,
        tamp_pressure_category TEXT
    );

    -- =========================
    -- SHOT EXTRACTION
    -- =========================
    CREATE TABLE shot_extraction (
        shot_id UUID PRIMARY KEY REFERENCES shots(id) ON DELETE CASCADE,

        water_temp_c NUMERIC(4,1),
        preinfusion_seconds NUMERIC(4,1),

        shot_time_seconds NUMERIC(5,2),
        yield_grams NUMERIC(6,2),

        peak_pressure_bar NUMERIC(4,2),
        avg_pressure_bar NUMERIC(4,2)
    );

    -- =========================
    -- SHOT ENVIRONMENT
    -- =========================
    CREATE TABLE shot_environment (
        shot_id UUID PRIMARY KEY REFERENCES shots(id) ON DELETE CASCADE,

        ambient_temp_c NUMERIC(4,1),
        humidity_percent NUMERIC(4,1),

        water_source TEXT,
        estimated_water_hardness_ppm INTEGER,

        machine_warmup_minutes INTEGER,
        shots_since_clean INTEGER
    );

    -- =========================
    -- SHOT FEEDBACK
    -- =========================
    CREATE TABLE shot_feedback (
        shot_id UUID PRIMARY KEY REFERENCES shots(id) ON DELETE CASCADE,

        overall_score INTEGER CHECK (overall_score BETWEEN 1 AND 10),

        acidity INTEGER CHECK (acidity BETWEEN 1 AND 10),
        sweetness INTEGER CHECK (sweetness BETWEEN 1 AND 10),
        bitterness INTEGER CHECK (bitterness BETWEEN 1 AND 10),
        body INTEGER CHECK (body BETWEEN 1 AND 10),

        extraction_assessment TEXT CHECK (
            extraction_assessment IN ('under', 'balanced', 'over')
        ),
        notes TEXT
    );