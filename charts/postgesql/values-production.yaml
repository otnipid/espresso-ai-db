---
postgresql:
  # PostgreSQL image
  image: postgres:15

  # PostgreSQL port
  port: 5432

  # PostgreSQL credentials (will be overridden by --set flags)
  user: espresso_prod_user
  password: null
  db: espresso_ml_production

  # Persistence configuration
  persistence:
    enabled: true
    size: 50Gi
    storageClass: fast-ssd

  # Resource configuration
  resources:
    requests:
      memory: "2Gi"
      cpu: "500m"
